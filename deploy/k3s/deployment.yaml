apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hapartition
  namespace: hapartition
spec:
  serviceName: hapartition-gossip
  replicas: 3
  selector:
    matchLabels:
      app: hapartition
  template:
    metadata:
      labels:
        app: hapartition
    spec:
      containers:
        - name: hapartition
          image: ghcr.io/peacewalker122/hapartition:latest
          imagePullPolicy: IfNotPresent
          args:
            - --node-id=$(POD_NAME)
            - --port=6379
            - --http=8080
            - --gossip-port=7946
            - --advertise-addr=$(POD_IP):6379
            - --join=hapartition-gossip:7946
            - --tls-insecure
            - --tls-cert=/etc/tls/$(POD_NAME)/tls.crt
            - --tls-key=/etc/tls/$(POD_NAME)/tls.key
            - --tls-ca=/etc/tls/$(POD_NAME)/ca.crt
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 7946
              name: gossip
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tls-0
              mountPath: /etc/tls/hapartition-0
              readOnly: true
            - name: tls-1
              mountPath: /etc/tls/hapartition-1
              readOnly: true
            - name: tls-2
              mountPath: /etc/tls/hapartition-2
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 100m
            limits:
              memory: 128Mi
              cpu: 500m
      volumes:
        - name: tls-0
          secret:
            secretName: hapartition-0-tls
        - name: tls-1
          secret:
            secretName: hapartition-1-tls
        - name: tls-2
          secret:
            secretName: hapartition-2-tls
      terminationGracePeriodSeconds: 30
