---
# Headless service — gossip peer discovery via DNS.
# Each pod gets: hapartition-0.hapartition-gossip.hapartition.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: hapartition-gossip
  namespace: hapartition
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  selector:
    app: hapartition
  ports:
    - port: 7946
      name: gossip
      protocol: TCP

---
# NodePort service — external access via minikube.
# minikube service tunnels directly to pods, no LoadBalancer needed.
apiVersion: v1
kind: Service
metadata:
  name: hapartition
  namespace: hapartition
spec:
  type: NodePort
  selector:
    app: hapartition
  ports:
    - port: 6379
      name: redis
      targetPort: redis
    - port: 8080
      name: http
      targetPort: http
